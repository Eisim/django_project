{% extends "base.html" %}

{% block title %}Доступ запрещён — {{ block.super }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 text-center">
        <h1 class="display-1 fw-bold text-danger">403</h1>
        <h2 class="mb-3">Доступ запрещён</h2>
        <p class="lead text-muted">У вас нет прав для просмотра этой страницы.</p>
        <p>Если вы считаете, что это ошибка, обратитесь к администратору.</p>
        <a href="{% url 'blog:index' %}" class="btn btn-dark mt-3">Вернуться на главную</a>
    </div>
</div>
{% endblock %}
