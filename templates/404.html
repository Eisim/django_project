{% extends "base.html" %}

{% block title %}Страница не найдена — {{ block.super }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 text-center">
        <h1 class="display-1 fw-bold text-warning">404</h1>
        <h2 class="mb-3">Страница не найдена</h2>
        <p class="lead text-muted">Запрашиваемая страница не существует или была удалена.</p>
        <p>Проверьте правильность адреса или вернитесь на главную.</p>
        <a href="{% url 'blog:index' %}" class="btn btn-dark mt-3">На главную</a>
    </div>
</div>
{% endblock %}
