{% extends "base.html" %}

{% block title %}Пароль изменён — {{ block.super }}{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 text-center">
                    <div class="display-1 mb-3">✅</div>
                    <h2 class="fw-bold mb-3">Пароль успешно изменён</h2>
                    <p class="text-muted mb-4">
                        Теперь вы можете войти в систему, используя новый пароль.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'users:login' %}" class="btn btn-primary px-4 py-2 fw-semibold">
                            Войти
                        </a>
                        <a href="{% url 'blog:index' %}" class="btn btn-outline-secondary px-4 py-2">
                            На главную
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
