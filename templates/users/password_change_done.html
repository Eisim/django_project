{% extends "base.html" %}

{% block title %}Пароль изменён — {{ block.super }}{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 text-center">
                    <h2 class="fw-bold mb-4">✅ Пароль успешно изменён</h2>
                    <p class="text-muted">Ваш пароль был обновлён. Теперь вы можете использовать новый пароль для входа.</p>
                    <div class="mt-4">
                        <a href="{% url 'blog:index' %}" class="btn btn-primary px-4 py-2">На главную</a>
                        {% if user.is_authenticated %}
                            <a href="{% url 'users:details' user.id %}" class="btn btn-outline-secondary px-4 py-2">Мой профиль</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
